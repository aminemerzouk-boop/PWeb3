<!-- File Path: /public/checkout.html -->
<!-- Purpose: Guest checkout – shipping & place order -->
<!-- Linked Files: css/style.css, js/cart.js -->

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout – Adult Clothing Store</title>
  <link href="https://api.fontshare.com/v2/css?f[]=sn-pro@400,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/cart.js" defer></script>
  <script src="/js/auth.js" defer></script>
  <script src="/js/header.js" defer></script>
  <script defer>
    // ---------- Cart summary and wilaya loading ----------
    async function loadCheckout() {
      const cart = getCart();
      if (cart.length === 0) {
        window.location.href = '/cart.html';
        return;
      }

      try {
        // Fetch all product data (simplified – you may add a dedicated batch endpoint later)
        const res = await fetch('/api/products');
        if (!res.ok) throw new Error('Failed to load products');
        const allProducts = await res.json();
        const productMap = {};
        allProducts.forEach(p => { productMap[p.id] = p; });

        // Build order summary and calculate subtotal
        let subtotal = 0;
        let summaryHtml = '';
        cart.forEach(item => {
          const product = productMap[item.productId];
          if (!product) return;
          const lineTotal = parseFloat(product.price) * item.quantity;
          subtotal += lineTotal;
          summaryHtml += `<p>${product.name} x ${item.quantity} = DA ${lineTotal.toFixed(2)}</p>`;
        });
        summaryHtml += `<p><strong>Subtotal: DA ${subtotal.toFixed(2)}</strong></p>`;
        document.getElementById('orderSummary').innerHTML = summaryHtml;

        // Store subtotal globally for later use
        window._subtotal = subtotal;

        // Load wilayas
        const wilayaSelect = document.getElementById('wilayaId');
        try {
          const wilayaRes = await fetch('/api/wilayas');
          if (!wilayaRes.ok) throw new Error('Failed to load wilayas');
          const wilayas = await wilayaRes.json();
          if (!wilayas.length) {
            wilayaSelect.innerHTML = '<option value="">No delivery areas available</option>';
            return;
          }
          wilayas.forEach(w => {
            const opt = document.createElement('option');
            opt.value = w.id;
            opt.textContent = `${w.name} (Delivery: DA${parseFloat(w.deliveryFee).toFixed(2)})`;
            opt.dataset.fee = w.deliveryFee;
            wilayaSelect.appendChild(opt);
          });
        } catch (e) {
          wilayaSelect.innerHTML = '<option value="">Error loading</option>';
          console.error(e);
          alert('Could not load delivery options.');
        }

        // Initial total (subtotal only, delivery fee = 0)
        updateTotalDisplay(subtotal, 0);
      } catch (err) {
        console.error(err);
        alert('Error loading checkout data.');
      }
    }

    function updateTotalDisplay(subtotal, deliveryFee) {
      const total = subtotal + deliveryFee;
      document.getElementById('deliveryFee').textContent = deliveryFee.toFixed(2);
      document.getElementById('totalAmount').textContent = total.toFixed(2);
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadCheckout();

      // Wilaya change event
      const wilayaSelect = document.getElementById('wilayaId');
      wilayaSelect.addEventListener('change', () => {
        const selected = wilayaSelect.options[wilayaSelect.selectedIndex];
        const deliveryFee = selected?.dataset?.fee ? parseFloat(selected.dataset.fee) : 0;
        updateTotalDisplay(window._subtotal || 0, deliveryFee);
      });
    });

    // ---------- Place order ----------
    async function placeOrder(e) {
      e.preventDefault();
      const form = document.getElementById('checkoutForm');
      const formData = new FormData(form);
      const orderData = {
        email: formData.get('email'),
        firstName: formData.get('firstName'),
        lastName: formData.get('lastName'),
        phone: formData.get('phone'),
        address: formData.get('address'),
        wilayaId: formData.get('wilayaId'),
        items: getCart().map(item => ({
          productId: item.productId,
          quantity: item.quantity
        }))
      };

      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderData)
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Order failed');
        }
        const result = await res.json();
        clearCart();
        alert('Order placed successfully! Order ID: ' + result.orderId);
        window.location.href = '/';
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }
  </script>
</head>

<body>
  <header class="site-header">
    <div class="container header-container">
      <a href="/" class="logo" aria-label="AS Cart Services home">
        <img src="/css/logo.png" alt="AS Cart Services">
      </a>
      <nav class="simple-nav">
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/cart.html">Cart <span id="cartCount">0</span></a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container page-main">
    <h1>Checkout</h1>
    <div class="checkout-layout">
      <div class="checkout-form">
        <h2>Shipping Information</h2>
        <form id="checkoutForm" onsubmit="placeOrder(event)">
          <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" required>
          </div>
          <div class="form-group">
            <label>First Name *</label>
            <input type="text" name="firstName" required>
          </div>
          <div class="form-group">
            <label>Last Name *</label>
            <input type="text" name="lastName" required>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone">
          </div>
          <div class="form-group">
            <label>Delivery Address *</label>
            <input type="text" name="address" required>
          </div>
          <div class="form-group">
            <label>Wilaya *</label>
            <select id="wilayaId" name="wilayaId" required>
              <option value="">Select Wilaya</option>
            </select>
          </div>
          <button type="submit" class="btn-primary">Place Order</button>
        </form>
      </div>
      <div class="checkout-summary">
        <h2>Order Summary</h2>
        <div id="orderSummary"></div>
        <p>Delivery Fee: DA<span id="deliveryFee">0.00</span></p>
        <p>Total: <strong>DA<span id="totalAmount">0.00</span></strong></p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-container">
      <p>&copy; 2026 Adult Clothing Store. All rights reserved.</p>
    </div>
  </footer>
</body>

</html>
